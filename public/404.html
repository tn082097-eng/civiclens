<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CivicLens — not published yet</title>
<style>
:root { --bg: #14110d; --fg: #f5f1e8; --fg-dim: #a59f8e; --fg-muted: #6b6557; --line: #2e2a22; }
body {
  margin: 0; background: var(--bg); color: var(--fg);
  font-family: 'Charter', 'Source Serif 4', 'Iowan Old Style', Georgia, serif;
  line-height: 1.55;
}
main { max-width: 640px; margin: 0 auto; padding: 96px 20px; }
h1 { font-size: 26px; margin: 0 0 12px; }
p { color: var(--fg-dim); }
a { color: var(--fg); text-decoration: underline; text-decoration-color: var(--fg-muted); text-underline-offset: 3px; }
</style>
</head>
<body>
<main>
  <h1>Not published yet</h1>
  <p>CivicLens is in a single-member beta: one member is published end-to-end while
  the methodology is validated. This page — most likely another member's profile or a
  corpus-wide view — hasn't passed that verification yet.</p>
  <p><a id="home" href="/">← Back to CivicLens</a></p>
</main>
<script>
// Project Pages serve under /<repo>/ — resolve the landing from the URL.
if (location.hostname.endsWith('github.io')) {
  document.getElementById('home').href = '/' + location.pathname.split('/')[1] + '/';
}
</script>
</body>
</html>
