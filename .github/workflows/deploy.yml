# Deploy the committed launch artifact (public/) to GitHub Pages.
#
# DORMANT BY DESIGN: manual trigger only (workflow_dispatch). Flipping this
# live is a deliberate act, not a side effect of a push.
#
# Verified-artifact deployment (docs/adr/0002 §C): the site is built and
# byte-diff-verified LOCALLY, packaged into public/ by
# scripts/package-launch.sh, and committed. This workflow uploads those
# exact bytes. Rebuilding in CI is deliberately unsupported — it would need
# the DuckDB (never published: public repo + raw OpenSecrets-derived tables)
# and would render the full roster, contradicting the single-member launch
# scope. No Node build, no secrets, no data access.

name: deploy-pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public/
      - id: deployment
        uses: actions/deploy-pages@v4
